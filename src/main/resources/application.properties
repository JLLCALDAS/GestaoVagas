#jdbc:postgresql://localhost:5432/gestao_vagas
#postgres
#postgres
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/gestao_vagas}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.application.name=gestao_vagas
spring.jpa.hibernate.ddl-auto=update

security.token.secret = @GESTAO_VAGAS_SECRET@123#
security.token.secret.candidate = @GESTAO_VAGAS_SECRET_CANDIDATE@123#

management.endpoints.enabled-by-default=false
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.enabled=true
management.endpoint.health.show-details=always
management.endpoint.info.enabled=true
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
